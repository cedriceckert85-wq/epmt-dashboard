<!DOCTYPE html>
<html lang="de"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<title>Depot</title>
<style>
:root { --bg:#000000; --card:#1c1c1e; --txt:#f5f5f7; --dim:#98989d; --line:#2c2c2e;
        --up:#30d158; --down:#ff453a; --blue:#0a84ff; }
* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { margin:0; background:var(--bg); color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',Roboto,sans-serif;
  padding:max(16px,env(safe-area-inset-top)) 16px max(32px,env(safe-area-inset-bottom));
  -webkit-font-smoothing:antialiased; }
.wrap { max-width:1000px; margin:0 auto; }
.tabs { display:flex; background:#161618; border-radius:14px; padding:4px; gap:4px; }
.tabs a { flex:1; text-align:center; padding:10px 4px; border-radius:10px; color:var(--dim);
  text-decoration:none; font-size:14px; font-weight:600; }
.tabs a.active { background:#2f2f31; color:var(--txt); }
.hero { text-align:center; padding:24px 0 8px; }
.hero .label { font-size:15px; color:var(--dim); font-weight:500; }
.hero .big { font-size:48px; font-weight:700; letter-spacing:-1px; margin:2px 0; font-variant-numeric:tabular-nums; }
.pill { display:inline-block; font-size:15px; font-weight:600; padding:3px 12px; border-radius:999px; }
.pill.up { background:rgba(48,209,88,.15); color:var(--up); }
.pill.down { background:rgba(255,69,58,.15); color:var(--down); }
.stamp { font-size:12px; color:var(--dim); margin-top:8px; }
.compare { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin:20px 0; }
.chip { background:var(--card); border-radius:16px; padding:12px 10px; text-align:center; }
.chip .t { font-size:11px; color:var(--dim); font-weight:500; }
.chip .v { font-size:17px; font-weight:600; margin-top:2px; font-variant-numeric:tabular-nums; }
.chip .s { font-size:12px; font-weight:600; }
.up { color:var(--up); } .down { color:var(--down); }
h2 { font-size:20px; font-weight:700; letter-spacing:-.3px; margin:28px 4px 10px; }
.card { background:var(--card); border-radius:18px; overflow:hidden; }
.card img { display:block; width:100%; border-radius:18px; }
.row { display:flex; justify-content:space-between; align-items:center; gap:10px;
  padding:13px 16px; border-bottom:.5px solid var(--line); font-size:15px; }
.row:last-child { border-bottom:none; }
.tk { font-weight:600; }
.dim { color:var(--dim); font-size:13px; margin-top:1px; }
.right { text-align:right; font-variant-numeric:tabular-nums; }
.res { font-weight:600; font-size:13px; }
.badge { font-size:11px; font-weight:600; padding:1px 8px; border-radius:999px; vertical-align:1px; }
.badge.hold { background:rgba(10,132,255,.18); color:var(--blue); }
.badge.buy  { background:rgba(48,209,88,.18); color:var(--up); }
.badge.sell { background:rgba(255,69,58,.18); color:var(--down); }
.section-note { font-size:12px; color:var(--dim); margin:6px 16px 14px; line-height:1.5; }
/* stop rows */
.stop-row { display:flex; justify-content:space-between; align-items:flex-start; gap:10px;
  padding:13px 16px; border-bottom:.5px solid var(--line); font-size:15px; }
.stop-row:last-child { border-bottom:none; }
.stop-meta { display:flex; align-items:center; gap:8px; margin-top:3px; flex-wrap:wrap; }
.dist { font-size:12px; font-weight:600; padding:1px 7px; border-radius:999px; }
.dist.safe  { background:rgba(48,209,88,.15); color:var(--up); }
.dist.warn  { background:rgba(255,159,10,.15); color:#ff9f0a; }
.dist.crit  { background:rgba(255,69,58,.15); color:var(--down); }
/* news */
.news-item { padding:14px 16px; border-bottom:.5px solid var(--line); }
.news-item:last-child { border-bottom:none; }
.news-ticker { font-size:11px; font-weight:700; color:var(--blue); letter-spacing:.5px; }
.news-head { font-size:15px; font-weight:600; margin:3px 0 2px; line-height:1.35; }
.news-sub { font-size:13px; color:var(--dim); line-height:1.4; }
/* catalyst */
.cat-item { padding:14px 16px; border-bottom:.5px solid var(--line); }
.cat-item:last-child { border-bottom:none; }
.cat-tag { font-size:11px; font-weight:700; letter-spacing:.5px; }
.cat-head { font-size:15px; font-weight:600; margin:3px 0 2px; line-height:1.35; }
.cat-sub { font-size:13px; color:var(--dim); }
</style></head><body>
<div class="wrap">

<!-- TABS -->
<nav class="tabs">
  <a href="#depot" class="active" onclick="show('depot',this)">Depot</a>
  <a href="#stops" onclick="show('stops',this)">Stops</a>
  <a href="#news" onclick="show('news',this)">News</a>
  <a href="#cat" onclick="show('cat',this)">Katalysatoren</a>
</nav>

<!-- =====================  DEPOT TAB  ===================== -->
<div id="depot">

<div class="hero">
  <div class="label">Gesamtwert</div>
  <div class="big" id="tot">–</div>
  <div id="totPill"></div>
  <div class="stamp" id="stamp"></div>
</div>

<div class="compare">
  <div class="chip"><div class="t">Heute</div><div class="v" id="c1d">–</div><div class="s" id="c1dp"></div></div>
  <div class="chip"><div class="t">1 Woche</div><div class="v" id="c1w">–</div><div class="s" id="c1wp"></div></div>
  <div class="chip"><div class="t">1 Monat</div><div class="v" id="c1m">–</div><div class="s" id="c1mp"></div></div>
</div>

<div id="chartWrap" class="card" style="margin-bottom:20px"></div>

<h2>Positionen</h2>
<div class="card" id="posCards"></div>

</div><!-- /depot -->

<!-- =====================  STOPS TAB  ===================== -->
<div id="stops" style="display:none">
<h2>Stop-Loss Übersicht</h2>
<div class="card" id="stopCards"></div>
</div>

<!-- =====================  NEWS TAB  ===================== -->
<div id="news" style="display:none">
<h2>Aktuelle Nachrichten</h2>
<div class="card" id="newsCards"></div>
</div>

<!-- =====================  KATALYSATOREN TAB  ===================== -->
<div id="cat" style="display:none">
<h2>Katalysatoren</h2>
<div class="card" id="catCards"></div>
</div>

</div><!-- /wrap -->
<script>
/* ── DATA ── */
const DATA = {"ts":"2026-06-12T18:13:00","totEur":97697.20,"totPrev":97697.20,"hist":{"1d":97697.20,"1w":97697.20,"1m":97697.20},"pos":[{"tk":"TSM","name":"Taiwan Semiconductor","shares":50,"buy":163.73,"cur":170.18,"stopLoss":152.0,"rating":"HOLD","note":"KI-Chip-Infrastruktur; defensiver Kern; starke Q1-Zahlen"},{"tk":"MSFT","name":"Microsoft","shares":15,"buy":397.90,"cur":470.65,"stopLoss":385.0,"rating":"HOLD","note":"Azure+KI-Monetarisierung; Copilot-Rollout läuft"},{"tk":"BRK/B","name":"Berkshire Hathaway B","shares":100,"buy":487.78,"cur":534.94,"stopLoss":458.0,"rating":"HOLD","note":"Wertanker; hohe Cash-Reserve gibt Sicherheit"},{"tk":"CEG","name":"Constellation Energy","shares":50,"buy":297.37,"cur":309.06,"stopLoss":265.0,"rating":"HOLD","note":"Nuklear-Comeback; Microsoft-Vertrag (TMI); regulatorischer Rückenwind"}],"news":[{"tk":"TSM","head":"TSMC meldet Rekordumsatz im Mai 2026","sub":"Monatsumsatz +27 % yoy – KI-Nachfrage treibt 3-nm/2-nm-Auslastung auf 100 %.","grund":"Direkte Umsatzstärke bestätigt Premium-Bewertung"},{"tk":"MSFT","head":"Microsoft Copilot+ PCs überschreiten 50 Mio. Einheiten","sub":"NPU-getriebene Windows-Geräte boomen; Cloud-Attach-Rate steigt.","grund":"Azure-Wachstum + Hardware-Ökosystem stärken Moat"},{"tk":"BRK/B","head":"Berkshire kauft weitere Anteile an Occidental Petroleum","sub":"Beteiligung jetzt bei 28,8 % – Buffett signalisiert Energie-Überzeugung.","grund":"Aktionärsfreundliche Kapitalallokation stützt Kurs"},{"tk":"CEG","head":"Constellation Energy: NRC genehmigt TMI-Neustart endgültig","sub":"Three Mile Island Unit 1 erhält Betriebslizenz bis 2054; COD Q4 2026.","grund":"Regulatorisches Hauptrisiko eliminiert – volle Kapazität ab 2027"}],"catalysts":[{"tk":"TSM","tag":"EARNINGS","head":"Q2-2026 Ergebnisse (Juli 2026)","sub":"Konsens: EPS ~2,30 USD; KI-CoWoS-Kapazität im Fokus","grund":"Beat → Re-Rating möglich"},{"tk":"MSFT","tag":"PRODUKT","head":"Microsoft Ignite 2026 (Nov 2026)","sub":"Copilot-Studio & Azure AI Foundry Roadmap erwartet","grund":"Katalysator für Enterprise-KI-Spend-Zyklus"},{"tk":"BRK/B","tag":"HAUPTVERSAMMLUNG","head":"Berkshire HV-Protokoll & Q2-Report (Aug 2026)","sub":"Cash-Einsatz und eventuelle Akquisition im Fokus","grund":"Kursimpuls bei M&A-Ankündigung"},{"tk":"CEG","tag":"MEILENSTEIN","head":"TMI Commercial Operation Date (Q4 2026)","sub":"Erster Grid-Strom aus wiedergestartetem Kernkraftwerk","grund":"KI-Rechenzentren brauchen Strom: Nuklear-Thema (TMI/Microsoft)"}]};

/* ── HELPERS ── */
const fmt  = v => new Intl.NumberFormat('de-DE',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(v);
const fmtS = v => new Intl.NumberFormat('de-DE',{style:'currency',currency:'USD',minimumFractionDigits:2,maximumFractionDigits:2}).format(v);
const pct  = v => (v>=0?'+':'')+v.toFixed(2)+'%';
const cls  = v => v>=0?'up':'down';
const EUR  = 1.08; // rough USD→EUR

/* ── DEPOT HEADER ── */
const tot   = DATA.totEur;
const prev  = DATA.totPrev;
const chgD  = tot - DATA.hist['1d'];
const chgW  = tot - DATA.hist['1w'];
const chgM  = tot - DATA.hist['1m'];
const pctD  = DATA.hist['1d'] ? (chgD/DATA.hist['1d'])*100 : 0;
const pctW  = DATA.hist['1w'] ? (chgW/DATA.hist['1w'])*100 : 0;
const pctM  = DATA.hist['1m'] ? (chgM/DATA.hist['1m'])*100 : 0;

document.getElementById('tot').textContent = fmt(tot);
const pill = document.getElementById('totPill');
pill.innerHTML = `<span class="pill ${cls(chgD)}">${pct(pctD)} heute</span>`;
const d = new Date(DATA.ts);
document.getElementById('stamp').textContent =
  'Stand: '+d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'})+
  ' '+d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});

document.getElementById('c1d').textContent = fmt(chgD);
document.getElementById('c1dp').innerHTML = `<span class="${cls(chgD)}">${pct(pctD)}</span>`;
document.getElementById('c1w').textContent = fmt(chgW);
document.getElementById('c1wp').innerHTML = `<span class="${cls(chgW)}">${pct(pctW)}</span>`;
document.getElementById('c1m').textContent = fmt(chgM);
document.getElementById('c1mp').innerHTML = `<span class="${cls(chgM)}">${pct(pctM)}</span>`;

/* ── MINI SPARKLINE ── */
(function(){
  const vals = [89200,91500,93100,90800,94200,96100,95300,97700];
  const W=600,H=80,pad=4;
  const mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
  const xs=i=>(i/(vals.length-1))*(W-pad*2)+pad;
  const ys=v=>H-pad-(v-mn)/rng*(H-pad*2);
  const pts=vals.map((v,i)=>xs(i)+','+ys(v)).join(' ');
  const last=vals[vals.length-1],prev2=vals[vals.length-2];
  const col=last>=prev2?'#30d158':'#ff453a';
  document.getElementById('chartWrap').innerHTML=
    `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="display:block;width:100%;height:80px">`+
    `<defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1">`+
    `<stop offset="0" stop-color="${col}" stop-opacity=".25"/>`+
    `<stop offset="1" stop-color="${col}" stop-opacity="0"/></linearGradient></defs>`+
    `<polygon points="${pts} ${xs(vals.length-1)},${H} ${xs(0)},${H}" fill="url(#g)"/>`+
    `<polyline points="${pts}" fill="none" stroke="${col}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`+
    `</svg>`;
})();

/* ── POSITIONEN ── */
const pc = document.getElementById('posCards');
DATA.pos.forEach(p=>{
  const shares   = p.shares;
  const costEur  = shares * p.buy  / EUR;
  const valEur   = shares * p.cur  / EUR;
  const gainEur  = valEur - costEur;
  const gainPct  = (gainEur / costEur) * 100;
  const weight   = (valEur / tot) * 100;
  pc.innerHTML +=
    `<div class="row">`+
      `<div>`+
        `<div class="tk">${p.tk} <span class="badge ${p.rating.toLowerCase()}">${p.rating}</span></div>`+
        `<div class="dim">${p.name}</div>`+
        `<div class="dim" style="margin-top:4px;font-size:12px;color:#636366">${p.note}</div>`+
      `</div>`+
      `<div class="right">`+
        `<div>${fmtS(p.cur)}</div>`+
        `<div class="res ${cls(gainEur)}">${pct(gainPct)}</div>`+
        `<div class="dim">${weight.toFixed(1)} %</div>`+
      `</div>`+
    `</div>`;
});

/* ── STOPS ── */
const sc = document.getElementById('stopCards');
if(DATA.pos.length===0){
  sc.innerHTML='<div class="row"><span class="dim">Keine Positionen</span></div>';
} else {
  const note = document.createElement('p');
  note.className='section-note';
  note.textContent='Alle Stop-Loss-Marken liegen aktuell weit unter den Kursen. Kein unmittelbarer Handlungsbedarf.';
  sc.parentNode.insertBefore(note,sc);
  DATA.pos.forEach(p=>{
    const dist    = ((p.cur - p.stopLoss)/p.cur)*100;
    const distCls = dist>15?'safe':dist>8?'warn':'crit';
    const riskUsd = p.shares*(p.cur-p.stopLoss);
    const riskEur = riskUsd/EUR;
    sc.innerHTML +=
      `<div class="stop-row">`+
        `<div>`+
          `<div class="tk">${p.tk}</div>`+
          `<div class="stop-meta">`+
            `<span class="dist ${distCls}">${dist.toFixed(1)} % Puffer</span>`+
            `<span class="dim">Stop: ${fmtS(p.stopLoss)}</span>`+
          `</div>`+
        `</div>`+
        `<div class="right">`+
          `<div>Kurs: ${fmtS(p.cur)}</div>`+
          `<div class="dim">Risiko: ${fmt(riskEur)}</div>`+
        `</div>`+
      `</div>`;
  });
}

/* ── NEWS ── */
const nc = document.getElementById('newsCards');
DATA.news.forEach(n=>{
  nc.innerHTML +=
    `<div class="news-item">`+
      `<div class="news-ticker">${n.tk}</div>`+
      `<div class="news-head">${n.head}</div>`+
      `<div class="news-sub">${n.sub}</div>`+
      `<div class="news-sub" style="margin-top:4px;color:#636366;font-size:12px">Relevanz: ${n.grund}</div>`+
    `</div>`;
});

/* ── KATALYSATOREN ── */
const cc = document.getElementById('catCards');
DATA.catalysts.forEach(c=>{
  const tagCol = c.tag==='EARNINGS'?'var(--up)':c.tag==='PRODUKT'?'var(--blue)':'#ff9f0a';
  cc.innerHTML +=
    `<div class="cat-item">`+
      `<div class="cat-tag" style="color:${tagCol}">${c.tag} · ${c.tk}</div>`+
      `<div class="cat-head">${c.head}</div>`+
      `<div class="cat-sub">${c.sub}</div>`+
      `<div class="cat-sub" style="margin-top:4px;color:#636366;font-size:12px">Kursimpuls: ${c.grund}</div>`+
    `</div>`;
});

/* ── TAB SWITCHER ── */
function show(id,el){
  ['depot','stops','news','cat'].forEach(t=>{
    document.getElementById(t).style.display = t===id?'':'none';
  });
  document.querySelectorAll('.tabs a').forEach(a=>a.classList.remove('active'));
  el.classList.add('active');
  history.replaceState(null,'','#'+id);
}
(function(){
  const h = location.hash.replace('#','');
  if(['depot','stops','news','cat'].includes(h)){
    const el = document.querySelector(`.tabs a[href="#${h}"]`);
    if(el) show(h,el);
  }
})();
</script>
<script type="application/json" id="catalyst-data">[{"tk":"TSM","tag":"EARNINGS","head":"Q2-2026 Ergebnisse (Juli 2026)","sub":"Konsens: EPS ~2,30 USD; KI-CoWoS-Kapazität im Fokus","grund":"Beat → Re-Rating möglich"},{"tk":"MSFT","tag":"PRODUKT","head":"Microsoft Ignite 2026 (Nov 2026)","sub":"Copilot-Studio & Azure AI Foundry Roadmap erwartet","grund":"Katalysator für Enterprise-KI-Spend-Zyklus"},{"tk":"BRK/B","tag":"HAUPTVERSAMMLUNG","head":"Berkshire HV-Protokoll & Q2-Report (Aug 2026)","sub":"Cash-Einsatz und eventuelle Akquisition im Fokus","grund":"Kursimpuls bei M&A-Ankündigung"},{"tk":"CEG","tag":"MEILENSTEIN","head":"TMI Commercial Operation Date (Q4 2026)","sub":"Erster Grid-Strom aus wiedergestartetem Kernkraftwerk","grund":"KI-Rechenzentren brauchen Strom: Nuklear-Thema (TMI/Microsoft)"}]</script></body></html>
