<!DOCTYPE html>
<html lang="de"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<title>Depot</title>
<style>
:root { --bg:#000000; --card:#1c1c1e; --txt:#f5f5f7; --dim:#98989d; --line:#2c2c2e;
        --up:#30d158; --down:#ff453a; --blue:#0a84ff; }
* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { margin:0; background:var(--bg); color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',Roboto,sans-serif;
  padding:max(16px,env(safe-area-inset-top)) 16px max(32px,env(safe-area-inset-bottom));
  -webkit-font-smoothing:antialiased; }
.wrap { max-width:1000px; margin:0 auto; }
.tabs { display:flex; background:#161618; border-radius:14px; padding:4px; gap:4px; }
.tabs a { flex:1; text-align:center; padding:10px 4px; border-radius:10px; color:var(--dim);
  text-decoration:none; font-size:14px; font-weight:600; }
.tabs a.active { background:#2f2f31; color:var(--txt); }
.hero { text-align:center; padding:24px 0 8px; }
.hero .label { font-size:15px; color:var(--dim); font-weight:500; }
.hero .big { font-size:48px; font-weight:700; letter-spacing:-1px; margin:2px 0; font-variant-numeric:tabular-nums; }
.pill { display:inline-block; font-size:15px; font-weight:600; padding:3px 12px; border-radius:999px; }
.pill.up { background:rgba(48,209,88,.15); color:var(--up); }
.pill.down { background:rgba(255,69,58,.15); color:var(--down); }
.stamp { font-size:12px; color:var(--dim); margin-top:8px; }
.compare { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin:20px 0; }
.chip { background:var(--card); border-radius:16px; padding:12px 10px; text-align:center; }
.chip .t { font-size:11px; color:var(--dim); font-weight:500; }
.chip .v { font-size:17px; font-weight:600; margin-top:2px; font-variant-numeric:tabular-nums; }
.chip .s { font-size:12px; font-weight:600; }
.up { color:var(--up); } .down { color:var(--down); }
h2 { font-size:20px; font-weight:700; letter-spacing:-.3px; margin:28px 4px 10px; }
.card { background:var(--card); border-radius:18px; overflow:hidden; }
.card img { display:block; width:100%; border-radius:18px; }
.row { display:flex; justify-content:space-between; align-items:center; gap:10px;
  padding:13px 16px; border-bottom:.5px solid var(--line); font-size:15px; }
.row:last-child { border-bottom:none; }
.tk { font-weight:600; }
.dim { color:var(--dim); font-size:13px; margin-top:1px; }
.right { text-align:right; font-variant-numeric:tabular-nums; }
.res { font-weight:600; font-size:13px; }
.badge { font-size:11px; font-weight:600; padding:1px 8px; border-radius:999px; vertical-align:1px; }
.badge.buy { background:rgba(10,132,255,.12); color:var(--blue); }
.badge.sell { background:rgba(255,69,58,.12); color:var(--down); }
.badge.hold { background:rgba(152,152,157,.12); color:var(--dim); }
.sep { height:.5px; background:var(--line); margin:0 16px; }
table { width:100%; border-collapse:collapse; font-size:14px; }
th { text-align:left; font-size:11px; font-weight:600; color:var(--dim); padding:8px 16px 6px;
     text-transform:uppercase; letter-spacing:.5px; }
td { padding:10px 16px; border-top:.5px solid var(--line); vertical-align:top; }
tr:first-child td { border-top:none; }
.mono { font-variant-numeric:tabular-nums; }
.green { color:var(--up); } .red { color:var(--down); }
.note { font-size:12px; color:var(--dim); padding:10px 16px 14px; line-height:1.5; }
.section-label { font-size:11px; font-weight:600; color:var(--dim); text-transform:uppercase;
  letter-spacing:.5px; padding:14px 16px 6px; }
/* Watchlist */
.wl-row { display:flex; justify-content:space-between; align-items:center;
  padding:11px 16px; border-bottom:.5px solid var(--line); }
.wl-row:last-child { border-bottom:none; }
.wl-l .name { font-size:15px; font-weight:600; }
.wl-l .sub  { font-size:12px; color:var(--dim); margin-top:1px; }
.wl-r { text-align:right; }
.wl-r .price { font-size:15px; font-weight:600; font-variant-numeric:tabular-nums; }
.wl-r .chg   { font-size:12px; font-weight:600; margin-top:1px; }
/* inline sparkline */
.spark { display:flex; align-items:flex-end; gap:2px; height:28px; margin-left:10px; }
.spark span { width:4px; border-radius:2px 2px 0 0; min-height:3px; }
/* mini chart placeholder */
.mini-chart { height:160px; background:var(--card); border-radius:14px; margin:12px 0;
  display:flex; align-items:center; justify-content:center; color:var(--dim); font-size:13px; }
canvas { display:block; }
</style>
</head><body>
<div class="wrap">

<!-- NAV -->
<nav style="margin-bottom:18px">
  <div class="tabs">
    <a href="#depot" class="active" onclick="show('depot',this)">Depot</a>
    <a href="#watchlist" onclick="show('watchlist',this)">Watchlist</a>
    <a href="#orders" onclick="show('orders',this)">Orders</a>
    <a href="#log" onclick="show('log',this)">Log</a>
  </div>
</nav>

<!-- ==================  DEPOT  ================== -->
<section id="depot">

<div class="hero">
  <div class="label">Depotwert</div>
  <div class="big" id="totalVal">…</div>
  <div id="totalPill"></div>
  <div class="stamp" id="stamp"></div>
</div>

<div class="compare">
  <div class="chip"><div class="t">Heute</div><div class="v" id="c-day">…</div><div class="s" id="cs-day"></div></div>
  <div class="chip"><div class="t">1 Woche</div><div class="v" id="c-week">…</div><div class="s" id="cs-week"></div></div>
  <div class="chip"><div class="t">Gesamt</div><div class="v" id="c-total">…</div><div class="s" id="cs-total"></div></div>

<h2>Positionen</h2>
<div class="card" id="posCards"></div>

<h2>Verlauf</h2>
<div class="card">
  <canvas id="chartCanvas" height="180"></canvas>
</div>

</section>

<!-- ==================  WATCHLIST  ================== -->
<section id="watchlist" style="display:none">
<h2 style="margin-top:12px">Watchlist</h2>
<div class="card" id="wlCards"></div>
</section>

<!-- ==================  ORDERS  ================== -->
<section id="orders" style="display:none">

<div class="card">
  <table>
    <thead><tr><th>Titel</th><th>Typ</th><th>Limit</th><th>Stk</th><th>Status</th></tr></thead>

  </table>

</section>

<!-- ==================  LOG  ================== -->
<section id="log" style="display:none">

<div class="card">
  <table>
    <thead><tr><th>Datum</th><th>Titel</th><th>Aktion</th><th>Preis</th><th>Info / Ergebnis</th></tr></thead>
    <tbody id="logBody"></tbody>
  </table>
</div>
</section>

</div><!-- /wrap -->

<script>
/* ============================================================
   DATA
   ============================================================ */
const D = {"stand":"12.06.2026, 18:13","depot":{"gesamt":10798.72,"gestern":10798.72,"vorwoche":11039.88,"investiert":11150.0},"positionen":[{"ticker":"HIMS","name":"Hims & Hers Health","stk":80,"kurs":34.12,"kauf":28.5,"ziel":42.0,"stop":28.0,"aktion":"HOLD","info":"Biotin-Sema startet — warte auf 36-Break"},{"ticker":"LUNR","name":"Intuitive Machines","stk":55,"kurs":17.82,"kauf":18.5,"ziel":28.0,"stop":14.5,"aktion":"HOLD","info":"NASA-Vertrag intact — Rücksetzer normal"},{"ticker":"RVSN","name":"Rail Vision","stk":500,"kurs":1.39,"kauf":2.1,"ziel":3.5,"stop":0.9,"aktion":"HOLD","info":"Tief — kein Stopp, da Restposition"},{"ticker":"SATL","name":"Satellogic","stk":210,"kurs":1.28,"kauf":1.8,"ziel":3.0,"stop":0.8,"aktion":"HOLD","info":"Konsolidierung — Geduld"}],"watchlist":[{"ticker":"OKLO","name":"Oklo","kurs":42.18,"chg24":2.3,"chgW":-1.1,"ziel":55.0,"kommentar":"Nuklear-KI-Play: Microsoft-Deal, Aurora-Reaktor 2027"},{"ticker":"NNE","name":"Nano Nuclear","kurs":28.74,"chg24":1.8,"chgW":3.2,"ziel":38.0,"kommentar":"Micro-Reaktoren + Transportlösung — spekulativ"},{"ticker":"SMR","name":"NuScale Power","kurs":9.12,"chg24":-0.5,"chgW":2.1,"ziel":14.0,"kommentar":"SMR-Pionier, aber Kostenrisiko"},{"ticker":"PLTR","name":"Palantir","kurs":138.52,"chg24":1.2,"chgW":4.8,"ziel":165.0,"kommentar":"AIP-Momentum ungebrochen — zu teuer für Neueinstieg"},{"ticker":"RKLB","name":"Rocket Lab","kurs":28.91,"chg24":0.9,"chgW":-2.3,"ziel":38.0,"kommentar":"Neutron 2026 — Schlüsselevent"},{"ticker":"ASTS","name":"AST SpaceMobile","kurs":31.44,"chg24":3.1,"chgW":6.2,"ziel":45.0,"kommentar":"Satelliten-Direktnetz aktiv — Momentum"},{"ticker":"IONQ","name":"IonQ","kurs":38.76,"chg24":-1.4,"chgW":1.7,"ziel":52.0,"kommentar":"Quantencomputing-Leader — langfristig"},{"ticker":"RDDT","name":"Reddit","kurs":162.3,"chg24":2.7,"chgW":5.1,"ziel":195.0,"kommentar":"Data-Licensing + AI-Wachstum"},{"ticker":"APP","name":"AppLovin","kurs":388.14,"chg24":1.9,"chgW":8.3,"ziel":450.0,"kommentar":"Ad-Tech-Dominanz — teuer aber stark"},{"ticker":"CEG","name":"Constellation Energy","kurs":252.69,"chg24":0.8,"chgW":-0.4,"ziel":290.0,"kommentar":"Nuklear-Basisversorger für KI-Rechenzentren"}],"orders":[],"log":[{"datum":"11.06.2026","ticker":"HIMS","aktion":"Kauf","preis":28.5,"info":"80 Stk · Ziel 42 · Stop 28","ergebnis":"","grund":"Semaglutide-Biosimilar-Spekulation + starkes Q1"},{"datum":"10.06.2026","ticker":"LUNR","aktion":"Kauf","preis":18.5,"info":"55 Stk · Ziel 28 · Stop 14.5","ergebnis":"","grund":"NASA IM-3-Mission 2026 als Katalysator"},{"datum":"03.06.2026","ticker":"RVSN","aktion":"Kauf","preis":2.1,"info":"500 Stk · Ziel 3.5 · Stop 0.9","ergebnis":"","grund":"Eisenbahn-KI-Sensor — hochspekulativ"},{"datum":"28.05.2026","ticker":"SATL","aktion":"Kauf","preis":1.8,"info":"210 Stk · Ziel 3.0 · Stop 0.8","ergebnis":"","grund":"Geospatial-AI + Verteidigungskontrakte"},{"datum":"20.05.2026","ticker":"CEG","aktion":"Kauf","preis":252.69,"info":"50 € · Ziel 273.0 · Stop 237.0","ergebnis":"","grund":"KI-Rechenzentren brauchen Strom: Nuklear-Thema (TMI/Microsoft)"}]};

/* ============================================================
   HELPERS
   ============================================================ */
const fmt  = (n,d=2)=>n==null?'—':n.toLocaleString('de-DE',{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtE = n=>fmt(n)+' €';
const pct  = n=>( n>=0?'+':'')+fmt(n,2)+'%';
const arrow= n=>n>=0?'▲':'▼';

function pillHtml(val,isEur=false){
  const cls=val>=0?'up':'down';
  const txt=isEur?(val>=0?'+':'')+fmtE(val):pct(val);
  return `<span class="pill ${cls}">${arrow(val)} ${txt}</span>`;
}

/* ============================================================
   NAV
   ============================================================ */
function show(id,el){
  document.querySelectorAll('section').forEach(s=>s.style.display='none');
  document.getElementById(id).style.display='';
  document.querySelectorAll('.tabs a').forEach(a=>a.classList.remove('active'));
  el.classList.add('active');
  if(id==='depot') drawChart();
}

/* ============================================================
   DEPOT HERO
   ============================================================ */
(function(){
  const d=D.depot;
  document.getElementById('totalVal').textContent=fmtE(d.gesamt);
  const dayDiff=d.gesamt-d.gestern;
  const dayPct=(dayDiff/d.gestern)*100;
  document.getElementById('totalPill').innerHTML=pillHtml(dayDiff,true)+' '+pillHtml(dayPct);
  document.getElementById('stamp').textContent='Stand: '+D.stand;

  const wDiff=d.gesamt-d.vorwoche;
  const wPct=(wDiff/d.vorwoche)*100;
  const tDiff=d.gesamt-d.investiert;
  const tPct=(tDiff/d.investiert)*100;

  document.getElementById('c-day').textContent=fmtE(dayDiff);
  document.getElementById('cs-day').innerHTML=pillHtml(dayPct);
  document.getElementById('c-week').textContent=fmtE(wDiff);
  document.getElementById('cs-week').innerHTML=pillHtml(wPct);
  document.getElementById('c-total').textContent=fmtE(tDiff);
  document.getElementById('cs-total').innerHTML=pillHtml(tPct);
})();

/* ============================================================
   POSITIONS
   ============================================================ */
(function(){
  const cont=document.getElementById('posCards');
  D.positionen.forEach(p=>{
    const val=p.stk*p.kurs;
    const pl=p.stk*(p.kurs-p.kauf);
    const plPct=((p.kurs-p.kauf)/p.kauf)*100;
    const cls=pl>=0?'up':'down';
    const aCls=p.aktion==='Kauf'?'buy':p.aktion==='Verkauf'?'sell':'hold';
    cont.innerHTML+=`
    <div class="row">
      <div>
        <div class="tk">${p.ticker} <span class="badge ${aCls}">${p.aktion}</span></div>
        <div class="dim">${p.name} · ${p.stk} Stk</div>
        <div class="dim" style="margin-top:3px;font-size:12px;color:#636366">${p.info}</div>
      </div>
      <div class="right">
        <div>${fmtE(val)}</div>
        <div class="res ${cls}">${pl>=0?'+':''}${fmtE(pl)} (${pct(plPct)})</div>
        <div class="dim">${fmtE(p.kurs)} · Ø${fmtE(p.kauf)}</div>
      </div>
    </div>`;
  });
})();

/* ============================================================
   CHART
   ============================================================ */
const chartHistory=[{d:'06.05',v:10420},{d:'13.05',v:10680},{d:'20.05',v:11050},{d:'27.05',v:10890},{d:'03.06',v:10720},{d:'10.06',v:11040},{d:'12.06',v:10799}];

function drawChart(){
  const canvas=document.getElementById('chartCanvas');
  if(!canvas) return;
  const W=canvas.offsetWidth||window.innerWidth-32;
  canvas.width=W*window.devicePixelRatio;
  canvas.height=180*window.devicePixelRatio;
  canvas.style.width=W+'px';
  canvas.style.height='180px';
  const ctx=canvas.getContext('2d');
  ctx.scale(window.devicePixelRatio,window.devicePixelRatio);

  const pts=chartHistory;
  const vals=pts.map(p=>p.v);
  const mn=Math.min(...vals)-200, mx=Math.max(...vals)+200;
  const pad={t:16,b:28,l:8,r:8};
  const cw=W-pad.l-pad.r, ch=180-pad.t-pad.b;

  const x=i=>pad.l+(i/(pts.length-1))*cw;
  const y=v=>pad.t+ch*(1-(v-mn)/(mx-mn));

  // gradient fill
  const grad=ctx.createLinearGradient(0,pad.t,0,pad.t+ch);
  grad.addColorStop(0,'rgba(10,132,255,0.25)');
  grad.addColorStop(1,'rgba(10,132,255,0)');
  ctx.beginPath();
  ctx.moveTo(x(0),y(vals[0]));
  pts.forEach((_,i)=>{ if(i>0) ctx.lineTo(x(i),y(vals[i])); });
  ctx.lineTo(x(pts.length-1),pad.t+ch);
  ctx.lineTo(x(0),pad.t+ch);
  ctx.closePath();
  ctx.fillStyle=grad;
  ctx.fill();

  // line
  ctx.beginPath();
  ctx.moveTo(x(0),y(vals[0]));
  pts.forEach((_,i)=>{ if(i>0) ctx.lineTo(x(i),y(vals[i])); });
  ctx.strokeStyle='#0a84ff';
  ctx.lineWidth=2;
  ctx.stroke();

  // labels
  ctx.fillStyle='#636366';
  ctx.font=`${11*window.devicePixelRatio/window.devicePixelRatio}px -apple-system,sans-serif`;
  ctx.textAlign='center';
  pts.forEach((p,i)=>{ ctx.fillText(p.d,x(i),180-6); });
}
drawChart();

/* ============================================================
   WATCHLIST
   ============================================================ */
(function(){
  const cont=document.getElementById('wlCards');
  D.watchlist.forEach(w=>{
    const cls=w.chg24>=0?'up':'down';
    cont.innerHTML+=`
    <div class="wl-row">
      <div class="wl-l">
        <div class="name">${w.ticker}</div>
        <div class="sub">${w.name}</div>
        <div class="sub" style="margin-top:3px;font-size:11px">${w.kommentar}</div>
      </div>
      <div style="display:flex;align-items:center">
        <div class="wl-r">
          <div class="price">${fmt(w.kurs)} €</div>
          <div class="chg ${cls}">${arrow(w.chg24)} ${pct(w.chg24)}</div>
          <div class="sub">Ziel: ${fmt(w.ziel)} €</div>
        </div>
      </div>
    </div>`;
  });
})();

/* ============================================================
   ORDERS
   ============================================================ */
(function(){
  const tb=document.getElementById('ordersBody');
  if(!D.orders.length){
    tb.innerHTML='<tr><td colspan="5" style="text-align:center;color:var(--dim);padding:24px">Keine offenen Orders</td></tr>';
    return;
  }
  D.orders.forEach(o=>{
    const aCls=o.typ==='Kauf'?'buy':'sell';
    tb.innerHTML+=`<tr>
      <td><strong>${o.ticker}</strong><br><span style="color:var(--dim);font-size:12px">${o.name}</span></td>
      <td><span class="badge ${aCls}">${o.typ}</span></td>
      <td class="mono">${fmt(o.limit)} €</td>
      <td>${o.stk}</td>
      <td style="color:var(--dim);font-size:12px">${o.status}</td>
    </tr>`;
  });
})();

/* ============================================================
   LOG
   ============================================================ */
(function(){
  const tb=document.getElementById('logBody');
  D.log.forEach(l=>{
    const aCls=l.aktion==='Kauf'?'buy':l.aktion==='Verkauf'?'sell':'hold';
    const resCls=l.ergebnis&&l.ergebnis.startsWith('+')?'green':l.ergebnis&&l.ergebnis.startsWith('-')?'red':'';
    tb.innerHTML+=`<tr>
      <td style="color:var(--dim);font-size:12px;white-space:nowrap">${l.datum}</td>
      <td><strong>${l.ticker}</strong></td>
      <td><span class="badge ${aCls}">${l.aktion}</span></td>
      <td class="mono">${fmt(l.preis)} €</td>
      <td style="font-size:12px">
        <div>${l.info}</div>
        ${l.ergebnis?`<div class="${resCls}" style="font-weight:600">${l.ergebnis}</div>`:''}
        <div style="color:var(--dim);margin-top:2px">${l.grund}</div>
      </td>
    </tr>`;
  });
})();
