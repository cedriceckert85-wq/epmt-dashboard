<!DOCTYPE html>
<html lang="de"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<title>Depot</title>
<style>
:root { --bg:#000000; --card:#1c1c1e; --txt:#f5f5f7; --dim:#98989d; --line:#2c2c2e;
        --up:#30d158; --down:#ff453a; --blue:#0a84ff; }
* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { margin:0; background:var(--bg); color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',Roboto,sans-serif;
  padding:max(16px,env(safe-area-inset-top)) 16px max(32px,env(safe-area-inset-bottom));
  -webkit-font-smoothing:antialiased; }
.wrap { max-width:1000px; margin:0 auto; }
.tabs { display:flex; background:#161618; border-radius:14px; padding:4px; gap:4px; }
.tabs a { flex:1; text-align:center; padding:10px 4px; border-radius:10px; color:var(--dim);
  text-decoration:none; font-size:14px; font-weight:600; }
.tabs a.active { background:#2f2f31; color:var(--txt); }
.hero { text-align:center; padding:24px 0 8px; }
.hero .label { font-size:15px; color:var(--dim); font-weight:500; }
.hero .big { font-size:48px; font-weight:700; letter-spacing:-1px; margin:2px 0; font-variant-numeric:tabular-nums; }
.pill { display:inline-block; font-size:15px; font-weight:600; padding:3px 12px; border-radius:999px; }
.pill.up { background:rgba(48,209,88,.15); color:var(--up); }
.pill.down { background:rgba(255,69,58,.15); color:var(--down); }
.stamp { font-size:12px; color:var(--dim); margin-top:8px; }
.compare { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin:20px 0; }
.chip { background:var(--card); border-radius:16px; padding:12px 10px; text-align:center; }
.chip .t { font-size:11px; color:var(--dim); font-weight:500; }
.chip .v { font-size:17px; font-weight:600; margin-top:2px; font-variant-numeric:tabular-nums; }
.chip .s { font-size:12px; font-weight:600; }
.up { color:var(--up); } .down { color:var(--down); }
h2 { font-size:20px; font-weight:700; letter-spacing:-.3px; margin:28px 4px 10px; }
.card { background:var(--card); border-radius:18px; overflow:hidden; }
.card img { display:block; width:100%; border-radius:18px; }
.row { display:flex; justify-content:space-between; align-items:center; gap:10px;
  padding:13px 16px; border-bottom:.5px solid var(--line); font-size:15px; }
.row:last-child { border-bottom:none; }
.tk { font-weight:600; }
.dim { color:var(--dim); font-size:13px; margin-top:1px; }
.right { text-align:right; font-variant-numeric:tabular-nums; }
.res { font-weight:600; font-size:13px; }
.badge { font-size:11px; font-weight:600; padding:1px 8px; border-radius:999px; vertical-align:1px; }
.badge.up { background:rgba(48,209,88,.18); color:var(--up); }
.badge.down { background:rgba(255,69,58,.18); color:var(--down); }
.note-section { margin-top:32px; }
.note-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.note-header h2 { margin:0; }
.note-add { background:var(--blue); color:#fff; border:none; border-radius:10px; padding:8px 16px;
  font-size:14px; font-weight:600; cursor:pointer; }
.note-list { display:flex; flex-direction:column; gap:10px; }
.note-card { background:var(--card); border-radius:16px; padding:14px 16px; position:relative; }
.note-card .note-date { font-size:11px; color:var(--dim); margin-bottom:4px; }
.note-card .note-text { font-size:15px; line-height:1.45; white-space:pre-wrap; word-break:break-word; }
.note-card .note-del { position:absolute; top:10px; right:12px; background:none; border:none;
  color:var(--dim); font-size:18px; cursor:pointer; padding:2px 6px; border-radius:6px; }
.note-card .note-del:active { background:var(--line); }
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:100;
  display:flex; align-items:flex-end; justify-content:center; padding:0 0 env(safe-area-inset-bottom); }
.modal { background:#1c1c1e; border-radius:20px 20px 0 0; padding:20px 20px calc(20px + env(safe-area-inset-bottom));
  width:100%; max-width:600px; }
.modal h3 { margin:0 0 14px; font-size:18px; font-weight:700; }
.modal textarea { width:100%; background:#2c2c2e; color:var(--txt); border:none; border-radius:12px;
  padding:12px; font-size:15px; font-family:inherit; resize:none; outline:none; min-height:120px; }
.modal .modal-btns { display:flex; gap:10px; margin-top:12px; }
.modal .modal-btns button { flex:1; padding:12px; border:none; border-radius:12px; font-size:16px;
  font-weight:600; cursor:pointer; }
.modal .btn-cancel { background:#2c2c2e; color:var(--txt); }
.modal .btn-save { background:var(--blue); color:#fff; }
.section-toggle { display:flex; align-items:center; gap:8px; cursor:pointer; user-select:none; }
.section-toggle .arrow { font-size:13px; color:var(--dim); transition:transform .2s; }
.section-toggle.collapsed .arrow { transform:rotate(-90deg); }
.collapsible { overflow:hidden; transition:max-height .3s ease; }
.collapsible.collapsed { max-height:0 !important; }
</style></head>
<body>
<div class="wrap">

<!-- TABS -->
<nav class="tabs" style="margin-bottom:18px">
  <a href="index.html" class="active">Depot</a>
  <a href="news.html">News</a>
  <a href="trades.html">Trades</a>
</nav>

<!-- HERO -->
<div class="hero">
  <div class="label">Depotwert</div>
  <div class="big" id="heroVal">–</div>
  <div id="heroPill"></div>
  <div class="stamp" id="heroStamp"></div>
</div>

<!-- COMPARE CHIPS -->
<div class="compare">
  <div class="chip"><div class="t">Heute</div><div class="v" id="c0">–</div><div class="s" id="cs0"></div></div>
  <div class="chip"><div class="t">1 Woche</div><div class="v" id="c1">–</div><div class="s" id="cs1"></div></div>
  <div class="chip"><div class="t">1 Monat</div><div class="v" id="c2">–</div><div class="s" id="cs2"></div></div>
</div>

<!-- POSITIONS -->
<h2 class="section-toggle" onclick="toggleSec('pos')"><span class="arrow">▾</span> Positionen</h2>
<div class="collapsible" id="sec-pos">
<div class="card" id="posTable"></div>
</div>

<!-- WATCHLIST -->
<h2 class="section-toggle" onclick="toggleSec('watch')"><span class="arrow">▾</span> Watchlist</h2>
<div class="collapsible" id="sec-watch">
<div class="card" id="watchTable"></div>
</div>

<!-- ORDERS -->
<h2 class="section-toggle" onclick="toggleSec('orders')"><span class="arrow">▾</span> Offene Orders</h2>
<div class="collapsible" id="sec-orders">
<div class="card" id="ordersTable"></div>
</div>

<!-- NOTES -->
<div class="note-section">
  <div class="note-header">
    <h2 style="margin:0">Notizen</h2>
    <button class="note-add" onclick="openNote()">+ Notiz</button>
  </div>
  <div class="note-list" id="noteList"></div>
</div>

<!-- NOTE MODAL -->
<div class="modal-overlay" id="noteModal" style="display:none" onclick="closeNote(event)">
  <div class="modal">
    <h3>Neue Notiz</h3>
    <textarea id="noteTxt" placeholder="Notiz eingeben…"></textarea>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeNote()">Abbrechen</button>
      <button class="btn-save" onclick="saveNote()">Speichern</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const POSITIONS = [
  { tk:"EPMT",  name:"Epimeron Pharma",          shares:10730, avg:3.2604, currency:"USD" },
  { tk:"POET",  name:"POET Technologies",         shares:12000, avg:1.0767, currency:"CAD" },
  { tk:"RLMD",  name:"Relmada Therapeutics",      shares:350,   avg:14.30,  currency:"USD" },
  { tk:"HUMA",  name:"Humacyte",                  shares:900,   avg:4.9978, currency:"USD" },
  { tk:"BURU",  name:"Nuvini Holdings",           shares:3200,  avg:0.6434, currency:"USD" },
  { tk:"IDAI",  name:"Integrity AI",              shares:1500,  avg:3.0900, currency:"USD" },
  { tk:"SHOT",  name:"Safety Shot",               shares:5000,  avg:0.3952, currency:"USD" },
  { tk:"MGRM",  name:"Monogram Orthopaedics",     shares:1800,  avg:2.2278, currency:"USD" },
  { tk:"ATXI",  name:"Avenue Therapeutics",       shares:250,   avg:14.00,  currency:"USD" },
  { tk:"RSSS",  name:"Research Frontiers",        shares:1500,  avg:2.0000, currency:"USD" },
  { tk:"NXTT",  name:"NextTrip",                  shares:2100,  avg:0.5133, currency:"USD" },
  { tk:"GFAI",  name:"Guardforce AI",             shares:10000, avg:0.2490, currency:"USD" },
  { tk:"WAVS",  name:"Western Acquisition Ventures",shares:1100,avg:4.5455, currency:"USD" },
];

const WATCHLIST = [
  { tk:"NURO",  name:"NeurogesX" },
  { tk:"BFRI",  name:"Biofrontera" },
  { tk:"AEYE",  name:"AudioEye" },
  { tk:"BBAI",  name:"BigBear.ai" },
  { tk:"CLNN",  name:"Clene" },
  { tk:"ZVRA",  name:"Zevra Therapeutics" },
  { tk:"CUEN",  name:"Cuentas Mobile" },
  { tk:"SOPA",  name:"Society Pass" },
];

const OPEN_ORDERS = [
  { tk:"EPMT",  name:"Epimeron Pharma",     type:"HOLD", shares:10730, limit:null,   note:"Kernposition – kein Stop" },
  { tk:"POET",  name:"POET Technologies",   type:"HOLD", shares:12000, limit:null,   note:"Kernposition – kein Stop" },
  { tk:"RLMD",  name:"Relmada Therapeutics",type:"HOLD", shares:350,   limit:null,   note:"Kernposition – kein Stop" },
  { tk:"HUMA",  name:"Humacyte",            type:"HOLD", shares:900,   limit:null,   note:"Kernposition – kein Stop" },
  { tk:"BURU",  name:"Nuvini Holdings",     type:"STOP", shares:3200,  limit:0.30,   note:"Stop 0.30" },
  { tk:"IDAI",  name:"Integrity AI",        type:"STOP", shares:1500,  limit:2.00,   note:"Stop 2.00" },
  { tk:"SHOT",  name:"Safety Shot",         type:"STOP", shares:5000,  limit:0.25,   note:"Stop 0.25" },
  { tk:"MGRM",  name:"Monogram Orthopaedics",type:"WATCH",shares:1800, limit:null,   note:"beobachten" },
  { tk:"ATXI",  name:"Avenue Therapeutics", type:"WATCH",shares:250,   limit:null,   note:"beobachten" },
  { tk:"RSSS",  name:"Research Frontiers",  type:"WATCH",shares:1500,  limit:null,   note:"beobachten" },
  { tk:"NXTT",  name:"NextTrip",            type:"SELL", shares:2100,  limit:0.60,   note:"Limit 0.60" },
  { tk:"GFAI",  name:"Guardforce AI",       type:"SELL", shares:10000, limit:0.35,   note:"Limit 0.35" },
  { tk:"WAVS",  name:"Western Acquisition", type:"WATCH",shares:1100,  limit:null,   note:"beobachten" },
];

const EUR_USD = 1.08;
const CAD_USD = 0.72;

// ── HELPERS ──────────────────────────────────────────────────────────────────
function fmt(n,d=2){ return n==null?'–':n.toLocaleString('de-DE',{minimumFractionDigits:d,maximumFractionDigits:d}); }
function fmtEur(n){ return n==null?'–':'€'+fmt(n,2); }
function sign(n){ return n>=0?'+':''  ; }
function cl(n){ return n>=0?'up':'down'; }

function toEur(usd){ return usd/EUR_USD; }
function toUsd(val,currency){
  if(currency==="CAD") return val*CAD_USD;
  return val; // USD
}

// ── NOTES ────────────────────────────────────────────────────────────────────
function loadNotes(){ return JSON.parse(localStorage.getItem('depot_notes')||'[]'); }
function saveNotes(arr){ localStorage.setItem('depot_notes',JSON.stringify(arr)); }
function renderNotes(){
  const list=loadNotes();
  const el=document.getElementById('noteList');
  if(!list.length){ el.innerHTML='<div style="color:var(--dim);font-size:14px;padding:8px 4px">Noch keine Notizen.</div>'; return; }
  el.innerHTML=list.map((n,i)=>`
    <div class="note-card">
      <div class="note-date">${n.date}</div>
      <div class="note-text">${n.text.replace(/</g,'&lt;')}</div>
      <button class="note-del" onclick="delNote(${i})">×</button>
    </div>`).join('');
}
function openNote(){ document.getElementById('noteModal').style.display='flex'; document.getElementById('noteTxt').focus(); }
function closeNote(e){ if(!e||e.target===document.getElementById('noteModal')) { document.getElementById('noteModal').style.display='none'; document.getElementById('noteTxt').value=''; } }
function saveNote(){
  const t=document.getElementById('noteTxt').value.trim();
  if(!t) return;
  const arr=loadNotes();
  arr.unshift({date:new Date().toLocaleString('de-DE'),text:t});
  saveNotes(arr); renderNotes();
  closeNote();
}
function delNote(i){ const arr=loadNotes(); arr.splice(i,1); saveNotes(arr); renderNotes(); }

// ── SECTION TOGGLE ───────────────────────────────────────────────────────────
function toggleSec(id){
  const el=document.getElementById('sec-'+id);
  const hdr=el.previousElementSibling;
  const isOpen=!el.classList.contains('collapsed');
  if(isOpen){
    el.style.maxHeight=el.scrollHeight+'px';
    requestAnimationFrame(()=>{ el.classList.add('collapsed'); hdr.classList.add('collapsed'); });
  } else {
    el.classList.remove('collapsed'); hdr.classList.remove('collapsed');
    el.style.maxHeight=el.scrollHeight+'px';
    setTimeout(()=>{ el.style.maxHeight='none'; },310);
  }
}

// ── PRICE CACHE ──────────────────────────────────────────────────────────────
const cache={};
async function getQuote(tk){
  if(cache[tk]) return cache[tk];
  try{
    const r=await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${tk}?interval=1d&range=35d`);
    const j=await r.json();
    const meta=j.result?.[0]?.meta??j.chart?.result?.[0]?.meta;
    const timestamps=j.result?.[0]?.timestamp??j.chart?.result?.[0]?.timestamp??[];
    const closes=(j.result?.[0]?.indicators?.quote?.[0]?.close
                ??j.chart?.result?.[0]?.indicators?.quote?.[0]?.close??[]).filter(x=>x!=null);
    const price=meta?.regularMarketPrice??closes.at(-1);
    const prev=meta?.chartPreviousClose??meta?.previousClose??closes.at(-2);
    const weekAgo=closes.length>=6?closes.at(-6):closes[0];
    const monthAgo=closes.length>=22?closes.at(-22):closes[0];
    cache[tk]={price,prev,weekAgo,monthAgo};
    return cache[tk];
  }catch(e){ return null; }
}

// ── RENDER ───────────────────────────────────────────────────────────────────
async function renderPositions(){
  const tbody=document.getElementById('posTable');
  let totalEur=0, totalPrevEur=0, totalWeekEur=0, totalMonthEur=0;
  const rows=[];

  for(const p of POSITIONS){
    const q=await getQuote(p.tk);
    const price=q?.price??null;
    const prev=q?.prev??null;
    const weekAgo=q?.weekAgo??null;
    const monthAgo=q?.monthAgo??null;

    const costUsd=p.shares*p.avg*(p.currency==="CAD"?CAD_USD:1);
    const costEur=toEur(costUsd);

    let valEur=null,prevEur=null,weekEur=null,monthEur=null;
    let plEur=null,plPct=null,dayChg=null,dayPct=null;

    if(price!=null){
      const valUsd=toUsd(price*p.shares,p.currency);
      valEur=toEur(valUsd);
      plEur=valEur-costEur;
      plPct=(valEur/costEur-1)*100;
      totalEur+=valEur;
    }
    if(prev!=null){
      const prevUsd=toUsd(prev*p.shares,p.currency);
      prevEur=toEur(prevUsd);
      totalPrevEur+=prevEur;
      if(price!=null){ dayChg=valEur-prevEur; dayPct=(price/prev-1)*100; }
    }
    if(weekAgo!=null){
      weekEur=toEur(toUsd(weekAgo*p.shares,p.currency)); totalWeekEur+=weekEur;
    }
    if(monthAgo!=null){
      monthEur=toEur(toUsd(monthAgo*p.shares,p.currency)); totalMonthEur+=monthEur;
    }

    rows.push({p,price,valEur,plEur,plPct,dayChg,dayPct});
  }

  tbody.innerHTML=rows.map(({p,price,valEur,plEur,plPct,dayChg,dayPct})=>{
    const priceStr=price!=null?`${fmt(price,4)} ${p.currency}`:'–';
    const valStr=valEur!=null?fmtEur(valEur):'–';
    const plStr=plEur!=null?`<span class="res ${cl(plEur)}">${sign(plEur)}${fmtEur(plEur)} (${sign(plPct)}${fmt(plPct,1)}%)</span>`:'–';
    const dayStr=dayChg!=null?`<span class="${cl(dayChg)}">${sign(dayChg)}${fmtEur(dayChg)} (${sign(dayPct)}${fmt(dayPct,2)}%)</span>`:'–';
    return `<div class="row">
      <div><div class="tk">${p.tk} <span class="badge ${plEur!=null&&plEur>=0?'up':'down'}">${priceStr}</span></div><div class="dim">${p.name} · ${p.shares} Stk</div></div>
      <div class="right"><div>${valStr}</div><div class="res">${plStr}</div><div style="font-size:12px;color:var(--dim)">Heute: ${dayStr}</div></div>
    </div>`;
  }).join('');

  // Hero
  document.getElementById('heroVal').textContent=fmtEur(totalEur);
  const stamp=`Aktualisiert: ${new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})}`;
  document.getElementById('heroStamp').textContent=stamp;

  // Chips
  function setChip(id,sid,total,base){
    const d=base?total-base:null;
    const p=base?(total/base-1)*100:null;
    document.getElementById(id).textContent=fmtEur(total);
    document.getElementById(sid).innerHTML=d!=null?`<span class="${cl(d)}">${sign(d)}${fmtEur(d)} (${sign(p)}${fmt(p,1)}%)</span>`:'';
  }
  setChip('c0','cs0',totalEur,totalPrevEur);
  setChip('c1','cs1',totalEur,totalWeekEur);
  setChip('c2','cs2',totalEur,totalMonthEur);

  // Pill
  const dayTot=totalPrevEur?totalEur-totalPrevEur:null;
  if(dayTot!=null){
    const pct=(totalEur/totalPrevEur-1)*100;
    document.getElementById('heroPill').innerHTML=
      `<span class="pill ${cl(dayTot)}">${sign(dayTot)}${fmtEur(dayTot)} (${sign(pct)}${fmt(pct,2)}%)</span>`;
  }
}

async function renderWatchlist(){
  const tbody=document.getElementById('watchTable');
  const rows=[];
  for(const w of WATCHLIST){
    const q=await getQuote(w.tk);
    rows.push({w,q});
  }
  tbody.innerHTML=rows.map(({w,q})=>{
    const price=q?.price??null;
    const prev=q?.prev??null;
    const chg=price!=null&&prev!=null?price-prev:null;
    const pct=chg!=null?(chg/prev)*100:null;
    return `<div class="row">
      <div><div class="tk">${w.tk}</div><div class="dim">${w.name}</div></div>
      <div class="right">
        <div>${price!=null?fmt(price,4)+' USD':'–'}</div>
        <div class="res">${chg!=null?`<span class="${cl(chg)}">${sign(chg)}${fmt(chg,4)} (${sign(pct)}${fmt(pct,2)}%)</span>`:'–'}</div>
      </div>
    </div>`;
  }).join('');
}

function renderOrders(){
  const tbody=document.getElementById('ordersTable');
  tbody.innerHTML=OPEN_ORDERS.map(o=>{
    const typeColor={HOLD:'#30d158',STOP:'#ff453a',SELL:'#ffd60a',WATCH:'#98989d'}[o.type]||'#98989d';
    const limitStr=o.limit!=null?` @ ${fmt(o.limit,2)}`:'';
    return `<div class="row">
      <div><div class="tk">${o.tk} <span class="badge" style="background:${typeColor}22;color:${typeColor}">${o.type}${limitStr}</span></div>
      <div class="dim">${o.name} · ${o.shares} Stk</div></div>
      <div class="right" style="color:var(--dim);font-size:13px">${o.note}</div>
    </div>`;
  }).join('');
}

// ── INIT ──────────────────────────────────────────────────────────────────────
renderNotes();
renderOrders();
renderPositions();
renderWatchlist();

// init collapsible heights
document.querySelectorAll('.collapsible').forEach(el=>{ el.style.maxHeight='none'; });
</script>
</body></html>
