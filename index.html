<!DOCTYPE html>
<html lang="de"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<title>Depot</title>
<style>
:root { --bg:#000000; --card:#1c1c1e; --txt:#f5f5f7; --dim:#98989d; --line:#2c2c2e;
        --up:#30d158; --down:#ff453a; --blue:#0a84ff; }
* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { margin:0; background:var(--bg); color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',Roboto,sans-serif;
  padding:max(16px,env(safe-area-inset-top)) 16px max(32px,env(safe-area-inset-bottom));
  -webkit-font-smoothing:antialiased; }
.wrap { max-width:1000px; margin:0 auto; }
.tabs { display:flex; background:#161618; border-radius:14px; padding:4px; gap:4px; }
.tabs a { flex:1; text-align:center; padding:10px 4px; border-radius:10px; color:var(--dim);
  text-decoration:none; font-size:14px; font-weight:600; }
.tabs a.active { background:#2f2f31; color:var(--txt); }
.hero { text-align:center; padding:24px 0 8px; }
.hero .label { font-size:15px; color:var(--dim); font-weight:500; }
.hero .big { font-size:48px; font-weight:700; letter-spacing:-1px; margin:2px 0; font-variant-numeric:tabular-nums; }
.pill { display:inline-block; font-size:15px; font-weight:600; padding:3px 12px; border-radius:999px; }
.pill.up { background:rgba(48,209,88,.15); color:var(--up); }
.pill.down { background:rgba(255,69,58,.15); color:var(--down); }
.stamp { font-size:12px; color:var(--dim); margin-top:8px; }
.compare { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin:20px 0; }
.chip { background:var(--card); border-radius:16px; padding:12px 10px; text-align:center; }
.chip .t { font-size:11px; color:var(--dim); font-weight:500; }
.chip .v { font-size:17px; font-weight:600; margin-top:2px; font-variant-numeric:tabular-nums; }
.chip .s { font-size:12px; font-weight:600; }
.up { color:var(--up); } .down { color:var(--down); }
h2 { font-size:20px; font-weight:700; letter-spacing:-.3px; margin:28px 4px 10px; }
.card { background:var(--card); border-radius:18px; overflow:hidden; }
.card img { display:block; width:100%; border-radius:18px; }
.row { display:flex; justify-content:space-between; align-items:center; gap:10px;
  padding:13px 16px; border-bottom:.5px solid var(--line); font-size:15px; }
.row:last-child { border-bottom:none; }
.tk { font-weight:600; }
.dim { color:var(--dim); font-size:13px; margin-top:1px; }
.right { text-align:right; font-variant-numeric:tabular-nums; }
.res { font-weight:600; font-size:13px; }
.badge { font-size:11px; font-weight:600; padding:1px 8px; border-radius:999px; vertical-align:1px; }
.badge.buy { background:rgba(10,132,255,.12); color:var(--blue); }
.badge.sell { background:rgba(255,69,58,.12); color:var(--down); }
.badge.hold { background:rgba(152,152,157,.12); color:var(--dim); }
.section-note { font-size:12px; color:var(--dim); padding:10px 16px; }
.btn-row { display:flex; gap:8px; margin:12px 0; }
.btn { flex:1; padding:12px; border-radius:14px; border:none; font-size:15px; font-weight:600;
  cursor:pointer; background:var(--card); color:var(--txt); }
.btn.active { background:var(--blue); color:#fff; }
.sparkline { width:64px; height:28px; }
table { width:100%; border-collapse:collapse; font-size:14px; }
th { text-align:left; color:var(--dim); font-weight:500; padding:8px 16px; font-size:12px;
     border-bottom:.5px solid var(--line); }
td { padding:10px 16px; border-bottom:.5px solid var(--line); }
tr:last-child td { border-bottom:none; }
.mono { font-family:'SF Mono',Menlo,monospace; font-size:13px; font-variant-numeric:tabular-nums; }
#toast { position:fixed; bottom:max(32px,env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%);
  background:#1c1c1e; color:#fff; padding:10px 20px; border-radius:999px; font-size:14px;
  box-shadow:0 4px 20px rgba(0,0,0,.5); opacity:0; transition:opacity .3s; pointer-events:none; z-index:99; }
.news-item { padding:14px 16px; border-bottom:.5px solid var(--line); }
.news-item:last-child { border-bottom:none; }
.news-meta { font-size:11px; color:var(--dim); margin-bottom:4px; }
.news-title { font-size:15px; font-weight:500; line-height:1.4; }
.news-reason { font-size:12px; color:var(--dim); margin-top:4px; }
</style></head>

<!-- TABS -->

  <a href="#depot" class="active" onclick="show('depot',this)">Depot</a>

  <div class="chip"><div class="t">G/V %</div><div class="v" id="c-gvp">–</div></div>

<h2>Positionen</h2>
<div class="card" id="pos-list"></div>

<h2>Cashflow-Tabelle</h2>
<div class="card">
<table>

<!-- ========== MARKT ========== -->
<section id="markt" style="display:none">

<h2>Marktüberblick</h2>
<div class="card" id="mkt-list"></div>

<h2>Signale heute</h2>
<div class="card" id="sig-list"></div>

<h2>Watchlist</h2>
<div class="card" id="watch-list"></div>

</section>

<!-- ========== NEWS ========== -->
<section id="news" style="display:none">
<h2>Relevante News</h2>
<div class="card" id="news-list"></div>
</section>

<!-- ========== LOG ========== -->
<section id="log" style="display:none">
<h2>Entscheidungs-Log</h2>
<div class="card" id="log-list"></div>

</div><!-- /wrap -->

/* ============================================================
   HELPERS
   ============================================================ */
const fmt = (n, d=2) => n.toLocaleString('de-DE',{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtE = n => fmt(n) + ' €';
const cl = n => n >= 0 ? 'up' : 'down';
const sign = n => n >= 0 ? '+' : '';

function sparkSVG(arr) {
  const mn = Math.min(...arr), mx = Math.max(...arr), rng = mx - mn || 1;
  const pts = arr.map((v,i)=>{
    const x = (i/(arr.length-1))*60+2;
    const y = 26 - ((v-mn)/rng)*22;
    return `${x},${y}`;
  }).join(' ');
  const last = arr[arr.length-1], first = arr[0];
  const color = last >= first ? 'var(--up)' : 'var(--down)';
  return `<svg class="sparkline" viewBox="0 0 64 28"><polyline fill="none" stroke="${color}" stroke-width="1.8" points="${pts}"/></svg>`;
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.opacity = 1;
  setTimeout(() => t.style.opacity = 0, 2000);
}

/* ============================================================
   DEPOT
   ============================================================ */
function renderDepot() {
  let totalVal = 0, totalCost = 0;

  const rows = DATA.positionen.map(p => {
    const val  = p.stueck * p.akt_kurs;
    const cost = p.stueck * p.kauf_kurs;
    const gv   = val - cost;
    const gvp  = (gv / cost) * 100;
    totalVal  += val;
    totalCost += cost;

    const bCls = p.empfehlung === 'BUY' ? 'buy' : p.empfehlung === 'SELL' ? 'sell' : 'hold';
    return `
    <div class="row">
      <div>
        <span class="tk">${p.ticker}</span>
        <span class="badge ${bCls}">${p.empfehlung}</span><br>
        <span class="dim">${p.name} · ${p.stueck} Stk · Ø ${fmtE(p.kauf_kurs)}</span>
        <div style="margin-top:4px;font-size:12px;color:var(--dim)">${p.signal}</div>
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        ${sparkSVG(p.chart)}
        <div class="right">
          <div style="font-weight:600">${fmtE(p.akt_kurs)}</div>
          <div class="res ${cl(gv)}">${sign(gv)}${fmtE(gv)}<br>${sign(gvp)}${fmt(gvp)} %</div>
        </div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('pos-list').innerHTML = rows;

  const gv   = totalVal - totalCost;
  const gvp  = (gv / totalCost) * 100;
  document.getElementById('total').textContent = fmtE(totalVal);
  document.getElementById('c-cost').textContent = fmtE(totalCost);
  document.getElementById('c-gv').className = 'v ' + cl(gv);
  document.getElementById('c-gv').textContent = sign(gv) + fmtE(gv);
  document.getElementById('c-gvp').className = 'v ' + cl(gvp);
  document.getElementById('c-gvp').textContent = sign(gvp) + fmt(gvp) + ' %';

  const pill = `<span class="pill ${cl(gv)}">${sign(gvp)}${fmt(gvp)} %</span>`;
  document.getElementById('perf-pill').innerHTML = pill;
  document.getElementById('stamp').textContent = 'Stand: ' + DATA.meta.stand;

  // Cashflow
  const cfRows = DATA.cashflow.map(c => `
    <tr>
      <td>${c.datum}</td>
      <td>${c.typ}</td>
      <td>${c.ticker}</td>
      <td class="right mono ${cl(c.betrag)}">${sign(c.betrag)}${fmtE(Math.abs(c.betrag))}</td>
    </tr>`).join('');
  document.getElementById('cf-body').innerHTML = cfRows;
}

/* ============================================================
   MARKT
   ============================================================ */
function renderMarkt() {
  const mktRows = DATA.markt.map(m => `
    <div class="row">
      <div class="tk">${m.name}</div>
      <div class="right">
        <div style="font-weight:600">${m.kurs}</div>
        <div class="res ${m.trend === 'up' ? 'up' : 'down'}">${m.delta}</div>
      </div>
    </div>`).join('');
  document.getElementById('mkt-list').innerHTML = mktRows;

  const sigRows = DATA.signale.map(s => {
    const bCls = s.aktion === 'BUY' ? 'buy' : s.aktion === 'SELL' ? 'sell' : 'hold';
    return `
    <div class="row">
      <div>
        <span class="tk">${s.ticker}</span>
        <span class="badge ${bCls}">${s.aktion}</span><br>
        <span class="dim">${s.text}</span>
      </div>
    </div>`;
  }).join('');
  document.getElementById('sig-list').innerHTML = sigRows;

  const watchRows = DATA.watchlist.map(w => `
    <div class="row">
      <div>
        <span class="tk">${w.ticker}</span><br>
        <span class="dim">${w.name}</span>
      </div>
      <div class="right">
        <div style="font-weight:600">${w.kurs} €</div>
        <div class="dim">${w.ziel}</div>
      </div>
    </div>`).join('');
  document.getElementById('watch-list').innerHTML = watchRows;
}

/* ============================================================
   NEWS
   ============================================================ */
function renderNews() {
  const html = DATA.news.map(n => `
    <div class="news-item">
      <div class="news-meta">${n.datum} · ${n.quelle}${n.ticker ? ' · <b>'+n.ticker+'</b>' : ''}</div>
      <div class="news-title">${n.titel}</div>
      <div class="news-reason">${n.grund}</div>
    </div>`).join('');
  document.getElementById('news-list').innerHTML = html;
}

/* ============================================================
   LOG
   ============================================================ */
function renderLog() {
  const html = DATA.entscheidungen.map(e => `
    <div class="row" style="flex-direction:column;align-items:flex-start">
      <div style="display:flex;justify-content:space-between;width:100%;margin-bottom:4px">
        <span class="tk">${e.titel}</span>
        <span class="dim">${e.datum}</span>
      </div>
      <div style="font-size:14px;color:var(--dim);line-height:1.5">${e.inhalt}</div>
    </div>`).join('');
  document.getElementById('log-list').innerHTML = html;
}

/* ============================================================
   NAV
   ============================================================ */
function show(id, el) {
  ['depot','markt','news','log'].forEach(s => {
    document.getElementById(s).style.display = s === id ? '' : 'none';
  });
  document.querySelectorAll('.tabs a').forEach(a => a.classList.remove('active'));
  if (el) el.classList.add('active');
}

/* ---- init ---- */
renderDepot();
renderMarkt();
renderNews();
renderLog();
</script>
