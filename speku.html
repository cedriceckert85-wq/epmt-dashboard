<!DOCTYPE html>
<html lang="de"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<title>Speku-Depot</title>
<style>
:root { --bg:#000000; --card:#1c1c1e; --txt:#f5f5f7; --dim:#98989d; --line:#2c2c2e;
        --up:#30d158; --down:#ff453a; --blue:#0a84ff; }
* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { margin:0; background:var(--bg); color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',Roboto,sans-serif;
  padding:max(16px,env(safe-area-inset-top)) 16px max(32px,env(safe-area-inset-bottom));
  -webkit-font-smoothing:antialiased; }
.wrap { max-width:1000px; margin:0 auto; }
.tabs { display:grid; grid-template-columns:repeat(3,1fr); gap:4px; background:var(--card);
  border-radius:12px; padding:4px; margin-bottom:4px; }
.tab { text-align:center; padding:9px 0; border-radius:9px; font-size:14px; font-weight:600;
  color:var(--dim); text-decoration:none; }
.tab.active { background:#3a3a3c; color:var(--txt); }
.hero { text-align:center; padding:28px 0 8px; }
.hero .label { font-size:15px; color:var(--dim); font-weight:500; }
.hero .big { font-size:48px; font-weight:700; letter-spacing:-1px; margin:2px 0; font-variant-numeric:tabular-nums; }
.pill { display:inline-block; font-size:15px; font-weight:600; padding:3px 12px; border-radius:999px; }
.pill.up { background:rgba(52,199,89,.15); color:var(--up); }
.pill.down { background:rgba(255,59,48,.15); color:var(--down); }
.stamp { font-size:12px; color:var(--dim); margin-top:8px; }
.compare { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin:20px 0; }
.chip { background:var(--card); border-radius:16px; padding:12px 10px; text-align:center; }
.chip .t { font-size:11px; color:var(--dim); font-weight:500; }
.chip .v { font-size:17px; font-weight:600; margin-top:2px; font-variant-numeric:tabular-nums; }
.chip .s { font-size:12px; font-weight:600; }
.up { color:var(--up); } .down { color:var(--down); }
h2 { font-size:20px; font-weight:700; letter-spacing:-.3px; margin:28px 4px 10px; }
.card { background:var(--card); border-radius:18px; overflow:hidden; }
.card img { display:block; width:100%; border-radius:18px; }
.row { display:flex; justify-content:space-between; align-items:center; gap:10px;
  padding:13px 16px; border-bottom:.5px solid var(--line); font-size:15px; }
.row:last-child { border-bottom:none; }
.tk { font-weight:600; }
.dim { color:var(--dim); font-size:13px; margin-top:1px; }
.right { text-align:right; font-variant-numeric:tabular-nums; }
.res { font-weight:600; font-size:13px; }
.badge { font-size:11px; font-weight:600; padding:1px 8px; border-radius:999px; vertical-align:1px; }
.badge.buy { background:rgba(0,113,227,.12); color:var(--blue); }
.badge.sell { background:rgba(255,149,0,.15); color:#ff9500; }
.badge.speku { background:var(--down); color:#fff; }
.row.speku { background:rgba(255,69,58,.14); box-shadow:inset 4px 0 0 var(--down); }
.note { font-size:12px; color:var(--dim); line-height:1.5; margin:28px 8px 0; text-align:center; }
.lesson { padding:12px 16px; font-size:14px; border-bottom:.5px solid var(--line); }
</style></head><body><div class="wrap">

<div id="flotten-nav" data-active="speku-detail"></div><script src="https://cedriceckert85-wq.github.io/review/nav.js" defer></script>

<div id="stale-banner" style="display:none;background:rgba(255,69,58,.2);border:1px solid var(--down);
border-radius:12px;padding:10px 14px;margin-bottom:8px;font-size:14px;color:var(--down);font-weight:600">
⚠️ Diese Seite ist veraltet — der letzte Automatik-Lauf liegt über 24 Stunden zurück.</div>
<script>
(function(){
  const raw = document.getElementById('agent-daten');
  if(!raw) return;
  try {
    const d = JSON.parse(raw.textContent);
    const stand = new Date(d.stand.replace(/^(\d{2})\.(\d{2})\.(\d{4}),\s*/,'$3-$2-$1T'));
    if(isNaN(stand)) return;
    const ageH = (Date.now() - stand.getTime()) / 36e5;
    if(ageH > 24) document.getElementById('stale-banner').style.display='block';
  } catch(e){}
})();
</script>

<section class="hero">
  <div class="label">Speku-Depot · Vermögen</div>
  <div class="big" id="verm">—</div>
  <div id="pill-wrap"></div>
  <div class="stamp" id="stamp"></div>
</section>

<div class="compare" id="compare"></div>

<h2>Offene Positionen</h2>
<div class="card" id="pos-list"></div>

<h2>Trade-Logbuch</h2>
<div class="card" id="trade-log"></div>

<h2>Lektionen</h2>
<div class="card" id="lektionen"></div>

<p class="note" id="note-footer"></p>

<script type="application/json" id="agent-daten">{"stand": "12.06.2026, 17:59", "vermoegen": 2008.45, "rendite": 0.42, "cashQuote": 61.5, "realisiert": 5.25, "vsSpyPp": -1.43, "positionen": [{"ticker": "QBTS", "side": "long", "eur": 400.0, "entry": 23.25, "kurs": 22.94, "stop": 18.6, "ziel": 36.0, "maxTage": 90, "speku": false}, {"ticker": "IONQ", "side": "long", "eur": 250.0, "entry": 56.63, "kurs": 56.77, "stop": 46.0, "ziel": 75.0, "maxTage": 90, "speku": false}, {"ticker": "RGTI", "side": "long", "eur": 120.0, "entry": 19.45, "kurs": 20.73, "stop": 15.5, "ziel": 28.0, "maxTage": 60, "speku": false}], "trades": [{"zeit": "2026-06-12T15:38+02:00", "ticker": "RKLB", "aktion": "Verkauf", "preis": 106.05, "info": "+5.25 €", "ergebnis": "+4.37 %", "grund": "EXTREM-SPEKU beendet: Stop 119.80 nachboerslich gerissen (121.50/122.90), RTH eroeffnete aber bei 109.50 - Cover 106.05 = +4.4%. These (Sell-the-News) bestaetigte sich, der Pfad (erst Squeeze) haette uns fast rausgeworfen."}, {"zeit": "2026-06-11T19:55+02:00", "ticker": "RKLB", "aktion": "Kauf", "preis": 110.9, "info": "120 € · Ziel 99.8 · Stop 119.8", "ergebnis": "", "grund": "EXTREM-SPEKU: SpaceX-Listing-Fade - Kapital rotiert vom Proxy ins Original; Risiko: Day-1-Halo (+8-12% Sektor) -> Stop 119.80 hart"}, {"zeit": "2026-06-11T00:20+02:00", "ticker": "QBTS", "aktion": "Kauf", "preis": 23.25, "info": "400 € · Ziel 36.0 · Stop 18.6", "ergebnis": "", "grund": "Quantum-Asymmetrie: +179% Umsatz, Konsensziel 36$ = +55%, kaum YTD-gelaufen"}, {"zeit": "2026-06-11T00:20+02:00", "ticker": "IONQ", "aktion": "Kauf", "preis": 56.63, "info": "250 € · Ziel 75.0 · Stop 46.0", "ergebnis": "", "grund": "Quantum-Qualitaetsanker: Guidance 260-270M$, SkyWater-Katalysator, -33% unter Hoch"}, {"zeit": "2026-06-11T00:20+02:00", "ticker": "RGTI", "aktion": "Kauf", "preis": 19.45, "info": "120 € · Ziel 28.0 · Stop 15.5", "ergebnis": "", "grund": "Lottery-Ticket: 590M$ Cash-Polster, Gov-Katalysator round-getript"}]}</script>

<script>
(function(){
  const raw = document.getElementById('agent-daten');
  if (!raw) return;
  let d;
  try { d = JSON.parse(raw.textContent); } catch(e){ return; }

  // Hero
  const sign = d.rendite >= 0 ? '+' : '';
  document.getElementById('verm').textContent =
    d.vermoegen.toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2}) + ' €';
  document.getElementById('pill-wrap').innerHTML =
    `<span class="pill ${d.rendite>=0?'up':'down'}">${sign}${d.rendite.toFixed(2)} %</span>`;
  document.getElementById('stamp').textContent = 'Stand: ' + d.stand;

  // Compare chips
  const chips = [
    { t:'Cash-Quote',    v: d.cashQuote.toFixed(1)+'%',                  cls:'' },
    { t:'Realisiert',   v: (d.realisiert>=0?'+':'')+d.realisiert.toFixed(2)+' €', cls: d.realisiert>=0?'up':'down' },
    { t:'vs SPY (PP)',  v: (d.vsSpyPp>=0?'+':'')+d.vsSpyPp.toFixed(2)+' PP',     cls: d.vsSpyPp>=0?'up':'down' },
  ];
  document.getElementById('compare').innerHTML = chips.map(c=>
    `<div class="chip"><div class="t">${c.t}</div><div class="v ${c.cls}">${c.v}</div></div>`
  ).join('');

  // Positions
  const posList = document.getElementById('pos-list');
  if (!d.positionen || d.positionen.length === 0) {
    posList.innerHTML = '<div class="row"><span style="color:var(--dim)">Keine offenen Positionen</span></div>';
  } else {
    posList.innerHTML = d.positionen.map(p => {
      const pnlPct = ((p.kurs - p.entry) / p.entry * 100);
      const pnlEur = (p.eur * pnlPct / 100);
      const sign   = pnlPct >= 0 ? '+' : '';
      const cls    = pnlPct >= 0 ? 'up' : 'down';
      const spekuClass = p.speku ? ' speku' : '';
      const spekuBadge = p.speku ? ' <span class="badge speku">SPEKU</span>' : '';
      return `<div class="row${spekuClass}">
        <div><div class="tk">${p.ticker}${spekuBadge}</div>
          <div class="dim">${p.side.toUpperCase()} · ${p.eur}€ · Stop ${p.stop} · Ziel ${p.ziel}</div></div>
        <div class="right"><div class="${cls} res">${sign}${pnlPct.toFixed(2)}%</div>
          <div class="dim">${sign}${pnlEur.toFixed(2)} €</div></div>
      </div>`;
    }).join('');
  }

  // Trade log
  const tradeLog = document.getElementById('trade-log');
  if (!d.trades || d.trades.length === 0) {
    tradeLog.innerHTML = '<div class="row"><span style="color:var(--dim)">Keine Trades</span></div>';
  } else {
    tradeLog.innerHTML = d.trades.map(t => {
      const isBuy  = t.aktion === 'Kauf';
      const badgeCls = isBuy ? 'buy' : 'sell';
      const dt = new Date(t.zeit);
      const dateStr = isNaN(dt) ? t.zeit : dt.toLocaleString('de-DE',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
      return `<div class="row">
        <div style="flex:1">
          <div class="tk">${t.ticker} <span class="badge ${badgeCls}">${t.aktion}</span></div>
          <div class="dim">${dateStr} · ${t.info}</div>
          <div class="dim" style="margin-top:3px;line-height:1.4">${t.grund||''}</div>
        </div>
        <div class="right"><div class="res ${t.ergebnis&&t.ergebnis.startsWith('+')?'up':t.ergebnis?'down':''}">${t.ergebnis||''}</div>
          <div class="dim">${t.preis} $</div></div>
      </div>`;
    }).join('');
  }

  // Lektionen
  const lektionen = [
    { nr:1, text:'Nie nachkaufen, um einen Verlust zu retten — nur wenn die ursprüngliche These stärker wird.' },
    { nr:2, text:'Speku-Positionen sind auf max. 10% Depot-Anteil begrenzt. Darüber hinaus: kein Einstieg.' },
    { nr:3, text:'Bei -30% Stop-Loss automatisch — keine Ausnahmen, keine mentalen Stops.' },
    { nr:4, text:'Sell-the-News ist eine These, kein Automatismus. Erst Catalyst bestätigen, dann handeln.' },
    { nr:5, text:'Squeeze-Risiko immer einpreisen: selbst wenn die These stimmt, kann der Weg schmerzhaft sein.' },
  ];
  document.getElementById('lektionen').innerHTML = lektionen.map(l =>
    `<div class="lesson"><strong>#${l.nr}</strong> ${l.text}</div>`
  ).join('');

  // Footer note
  document.getElementById('note-footer').textContent =
    'Alle Angaben ohne Gewähr. Kein Anlageberatung. Stand: ' + d.stand + '. Automatisch generiert.';

})();
</script>

</div></body></html>
