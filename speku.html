<!DOCTYPE html>
<html lang="de"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<title>Speku-Depot</title>
<style>
:root { --bg:#000000; --card:#1c1c1e; --txt:#f5f5f7; --dim:#98989d; --line:#2c2c2e;
        --up:#30d158; --down:#ff453a; --blue:#0a84ff; }
* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { margin:0; background:var(--bg); color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',Roboto,sans-serif;
  padding:max(16px,env(safe-area-inset-top)) 16px max(32px,env(safe-area-inset-bottom));
  -webkit-font-smoothing:antialiased; }
.wrap { max-width:1000px; margin:0 auto; }
.tabs { display:grid; grid-template-columns:repeat(3,1fr); gap:4px; background:var(--card);
  border-radius:12px; padding:4px; margin-bottom:4px; }
.tab { text-align:center; padding:9px 0; border-radius:9px; font-size:14px; font-weight:600;
  color:var(--dim); text-decoration:none; }
.tab.active { background:#3a3a3c; color:var(--txt); }
.hero { text-align:center; padding:28px 0 8px; }
.hero .label { font-size:15px; color:var(--dim); font-weight:500; }
.hero .big { font-size:48px; font-weight:700; letter-spacing:-1px; margin:2px 0; font-variant-numeric:tabular-nums; }
.pill { display:inline-block; font-size:15px; font-weight:600; padding:3px 12px; border-radius:999px; }
.pill.up { background:rgba(52,199,89,.15); color:var(--up); }
.pill.down { background:rgba(255,59,48,.15); color:var(--down); }
.stamp { font-size:12px; color:var(--dim); margin-top:8px; }
.compare { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin:20px 0; }
.chip { background:var(--card); border-radius:16px; padding:12px 10px; text-align:center; }
.chip .t { font-size:11px; color:var(--dim); font-weight:500; }
.chip .v { font-size:17px; font-weight:600; margin-top:2px; font-variant-numeric:tabular-nums; }
.chip .s { font-size:12px; font-weight:600; }
.up { color:var(--up); } .down { color:var(--down); }
h2 { font-size:20px; font-weight:700; letter-spacing:-.3px; margin:28px 4px 10px; }
.card { background:var(--card); border-radius:18px; overflow:hidden; }
.card img { display:block; width:100%; border-radius:18px; }
.row { display:flex; justify-content:space-between; align-items:center; gap:10px;
  padding:13px 16px; border-bottom:.5px solid var(--line); font-size:15px; }
.row:last-child { border-bottom:none; }
.tk { font-weight:600; }
.dim { color:var(--dim); font-size:13px; margin-top:1px; }
.right { text-align:right; font-variant-numeric:tabular-nums; }
.res { font-weight:600; font-size:13px; }
.badge { font-size:11px; font-weight:600; padding:1px 8px; border-radius:999px; vertical-align:1px; }
.badge.buy { background:rgba(0,113,227,.12); color:var(--blue); }
.badge.sell { background:rgba(255,149,0,.15); color:#ff9500; }
.badge.speku { background:var(--down); color:#fff; }
.row.speku { background:rgba(255,69,58,.14); box-shadow:inset 4px 0 0 var(--down); }
.note { font-size:12px; color:var(--dim); line-height:1.5; margin:28px 8px 0; text-align:center; }
.lesson { padding:12px 16px; font-size:14px; border-bottom:.5px solid var(--line); }
</style></head><body><div class="wrap">

<div id="flotten-nav" data-active="speku-detail"></div><script src="https://cedriceckert85-wq.github.io/review/nav.js" defer></script>

<div id="stale-banner" style="display:none;background:rgba(255,69,58,.2);border:1px solid var(--down);
border-radius:12px;padding:10px 14px;margin-bottom:8px;font-size:14px;color:var(--down);font-weight:600">
⚠️ Diese Seite ist veraltet — der letzte Automatik-Lauf liegt über 24 Stunden zurück.</div>
<script>
const _agentRaw = document.getElementById('agent-daten');
if (_agentRaw) {
  try {
    const _d = JSON.parse(_agentRaw.textContent);
    const _ts = new Date(_d.stand.replace(/\./, '-').replace(/\./, '-').replace(', ','T') + ':00');
    if (Date.now() - _ts > 24*3600*1000) document.getElementById('stale-banner').style.display='';
  } catch(e){}
}
</script>

<div class="hero">
  <div class="label">Speku-Depot</div>
  <div class="big" id="val-depot">—</div>
  <span class="pill" id="pill-rendite">…</span>
  <div class="stamp" id="stamp">Stand: —</div>
</div>

<div class="compare" id="compare-chips"></div>

<h2>Offene Positionen</h2>
<div class="card" id="positionen-card"></div>

<h2>Trade-Log</h2>
<div class="card" id="trades-card"></div>

<p class="note" id="note-text"></p>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const raw = document.getElementById('agent-daten');
  if (!raw) return;
  let d;
  try { d = JSON.parse(raw.textContent); } catch(e) { return; }

  // Hero
  const depot = d.vermoegen ?? 0;
  document.getElementById('val-depot').textContent =
    depot.toLocaleString('de-DE',{style:'currency',currency:'EUR'});
  const pill = document.getElementById('pill-rendite');
  const rend = d.rendite ?? 0;
  pill.textContent = (rend>=0?'+':'')+rend.toFixed(2)+'%';
  pill.className = 'pill '+(rend>=0?'up':'down');
  document.getElementById('stamp').textContent = 'Stand: '+(d.stand??'—');

  // Compare chips
  const chips = [
    { t:'Realisiert', v:(d.realisiert??0), fmt:'eur', sign:true },
    { t:'Cash-Quote', v:(d.cashQuote??0), fmt:'pct', sign:false },
    { t:'vs S&P 500', v:(d.vsSpyPp??0), fmt:'pp', sign:true },
  ];
  const cc = document.getElementById('compare-chips');
  chips.forEach(c => {
    let val = c.v;
    let txt, cls;
    if (c.fmt==='eur') {
      txt = (val>=0?'+':'')+val.toLocaleString('de-DE',{style:'currency',currency:'EUR'});
    } else if (c.fmt==='pct') {
      txt = val.toFixed(1)+'%';
    } else {
      txt = (val>=0?'+':'')+val.toFixed(2)+' PP';
    }
    cls = c.sign ? (val>=0?'up':'down') : '';
    cc.innerHTML += `<div class="chip"><div class="t">${c.t}</div><div class="v ${cls}">${txt}</div></div>`;
  });

  // Positionen
  const pos = d.positionen ?? [];
  const pc = document.getElementById('positionen-card');
  if (!pos.length) {
    pc.innerHTML = '<div class="row"><span style="color:var(--dim)">Keine offenen Positionen</span></div>';
  } else {
    pos.forEach(p => {
      const diff = p.kurs && p.entry ? ((p.kurs - p.entry)/p.entry*100) : null;
      const diffStr = diff !== null ? (diff>=0?'+':'')+diff.toFixed(2)+'%' : '—';
      const cls = diff !== null ? (diff>=0?'up':'down') : '';
      const spekuBadge = p.speku ? '<span class="badge speku">SPEKU</span> ' : '';
      const sideLabel = (p.side==='short') ? '↓ Short' : '↑ Long';
      pc.innerHTML += `<div class="row${p.speku?' speku':''}">
        <div><div class="tk">${spekuBadge}${p.ticker} <span style="font-size:12px;font-weight:500;color:var(--dim)">${sideLabel}</span></div>
        <div class="dim">Entry ${p.entry??'—'} · Stop ${p.stop??'—'} · Ziel ${p.ziel??'—'}</div></div>
        <div class="right"><div class="${cls} res">${diffStr}</div>
        <div class="dim">${p.eur??'—'} €</div></div>
      </div>`;
    });
  }

  // Trades
  const trades = d.trades ?? [];
  const tc = document.getElementById('trades-card');
  if (!trades.length) {
    tc.innerHTML = '<div class="row"><span style="color:var(--dim)">Keine Trades</span></div>';
  } else {
    trades.forEach(t => {
      const isBuy = (t.aktion||'').toLowerCase().includes('kauf') && !(t.aktion||'').toLowerCase().includes('ver');
      const isSell = (t.aktion||'').toLowerCase().includes('verkauf');
      const badgeCls = isBuy ? 'buy' : (isSell ? 'sell' : '');
      const badgeTxt = isBuy ? 'Kauf' : (isSell ? 'Verkauf' : t.aktion);
      const ergebnis = t.ergebnis ? `<span class="res ${t.ergebnis.startsWith('+')?'up':'down'}">${t.ergebnis}</span>` : '';
      const grund = t.grund ? `<div class="lesson">${t.grund}</div>` : '';
      tc.innerHTML += `<div>
        <div class="row">
          <div><div class="tk"><span class="badge ${badgeCls}">${badgeTxt}</span> ${t.ticker}</div>
          <div class="dim">${t.zeit??''} · ${t.info??''}</div></div>
          <div class="right">${ergebnis}</div>
        </div>
        ${grund}
      </div>`;
    });
  }

  // Note
  const note = document.getElementById('note-text');
  note.textContent = 'Spekulative Positionen (≤5% Depotanteil) — erhöhtes Risiko, kein Anlageausschuss.';
});
</script>
